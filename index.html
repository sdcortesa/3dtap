<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cabaña Tusa</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #ffffff;
      overflow: hidden;
    }

    model-viewer {
      width: 100%;
      height: 100vh;
      background: #ffffff;
      --poster-color: #ffffff;
    }
  </style>
</head>
<body>

  <model-viewer
    src="./cabana-tusa.glb"
    auto-rotate
    auto-rotate-delay="0"
    rotation-per-second="5deg"
    camera-controls
    disable-pan
    environment-image="commerce"
    exposure="0.82"
    shadow-intensity="2"
    shadow-softness="0.9"
    camera-orbit="45deg 70deg 170%"
    min-camera-orbit="auto 55deg auto"
    max-camera-orbit="auto 85deg auto"
    field-of-view="32deg"
    interaction-prompt="none"
    tone-mapping="aces">
  </model-viewer>

</body>
</html>
