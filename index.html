<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Casas TAP</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #ffffff;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .viewer-wrap {
      position: relative;
      width: 100%;
      height: 100vh;
      background: #ffffff;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      background: #ffffff;
      --poster-color: #ffffff;
      transition: opacity 0.5s ease;
      opacity: 1;
    }

    .titulo-modelo {
      position: absolute;
      top: 28px;
      left: 32px;
      z-index: 10;
      font-size: 22px;
      font-weight: 600;
      color: #111;
      background: rgba(255,255,255,0.72);
      padding: 10px 14px;
      border-radius: 10px;
      backdrop-filter: blur(6px);
    }
  </style>
</head>
<body>

  <div class="viewer-wrap">
    <div id="tituloModelo" class="titulo-modelo">Casa 1</div>

    <model-viewer
      id="viewer"
      src="./cabana-tusa.glb"
      camera-controls
      disable-zoom
      auto-rotate
      auto-rotate-delay="0"
      rotation-per-second="8deg"

      shadow-intensity="1.0"
      shadow-softness="0.8"
      exposure="1.0"

      environment-image="neutral"
      tone-mapping="aces"

      camera-orbit="245deg 58deg 80%"
      camera-target="0m 2m 0m"
      min-camera-orbit="auto 45deg 80%"
      max-camera-orbit="auto 75deg 80%"
      field-of-view="28deg"

      interaction-prompt="none"
      disable-pan>
    </model-viewer>
  </div>

  <script>
    const viewer = document.getElementById('viewer');
    const tituloModelo = document.getElementById('tituloModelo');

    const modelos = [
      {
        archivo: './cabana-tusa.glb',
        nombre: ''
      },
      {
        archivo: './cabana-2.glb',
        nombre: ''
      }
    ];

    let indiceActual = 0;
    let cambiando = false;

    function cambiarModeloAutomatico() {
      if (cambiando) return;
      cambiando = true;

      viewer.style.opacity = '0';

      setTimeout(() => {
        indiceActual = (indiceActual + 1) % modelos.length;

        viewer.src = modelos[indiceActual].archivo;
        tituloModelo.textContent = modelos[indiceActual].nombre;

        viewer.addEventListener('load', function onLoad() {
          viewer.removeEventListener('load', onLoad);
          viewer.style.opacity = '1';
          cambiando = false;
        });

        viewer.addEventListener('error', function onError() {
          viewer.removeEventListener('error', onError);
          viewer.style.opacity = '1';
          cambiando = false;
          console.error('No se pudo cargar el modelo:', modelos[indiceActual].archivo);
        });
      }, 300);
    }

    setInterval(cambiarModeloAutomatico, 6000);
  </script>

</body>
</html>
