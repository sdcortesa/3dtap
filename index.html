<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cabaña Tusa</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #e9e1d3;
    }
    #msg {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(255,255,255,.85);
      padding: 8px 10px;
      border-radius: 8px;
      font: 14px Arial, sans-serif;
    }
    model-viewer {
      width: 100%;
      height: 100vh;
      background: #e9e1d3;
    }
  </style>
</head>
<body>
  <div id="msg">Cargando...</div>

  <model-viewer
    id="viewer"
    src="./cabana-tusa.glb"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1">
  </model-viewer>

  <script>
    const msg = document.getElementById('msg');
    const viewer = document.getElementById('viewer');

    viewer.addEventListener('load', () => {
      msg.textContent = 'Modelo cargado correctamente';
    });

    viewer.addEventListener('error', (e) => {
      console.error('Error del modelo:', e);
      msg.textContent = 'Error: no se pudo cargar cabana-tusa.glb';
    });
  </script>
</body>
</html>
