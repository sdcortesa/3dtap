<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cabaña Tusa</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #ffffff;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    model-viewer {
      width: 100%;
      height: 100vh;
      background: #ffffff;
      --poster-color: #ffffff;
    }
  </style>
</head>
<body>

  <model-viewer
    src="./cabana-tusa.glb"
    camera-controls
    disable-zoom
    auto-rotate
    auto-rotate-delay="0"
    rotation-per-second="8deg"

    shadow-intensity="0.9"
    shadow-softness="0.8"
    exposure="1.1"

    environment-image="neutral"
    tone-mapping="aces"

    camera-orbit="215deg 68deg 100%"
    min-camera-orbit="auto 55deg 100%"
    max-camera-orbit="auto 85deg 100%"
    field-of-view="28deg"

    interaction-prompt="none"
    disable-pan>
  </model-viewer>

</body>
</html>
